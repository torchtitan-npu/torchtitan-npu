name: Sync Upstream

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write

jobs:
  sync-master:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://gitcode.com/cann/torchtitan-npu.git
          git fetch upstream --tags

      - name: Checkout master
        run: git checkout master

      - name: Rebase on upstream master
        uses: ./.github/actions/fetch-and-rebase
        with:
          repo_path: .
          remote_branch: upstream/master
          loop: "3"

      - name: Push synced master
        run: git push --force-with-lease origin master

      - name: Push tags
        run: git push origin --tags
