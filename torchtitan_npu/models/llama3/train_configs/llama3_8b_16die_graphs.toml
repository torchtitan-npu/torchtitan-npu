# NOTE: this toml config is a preset for 8 A3 NPUs.

[job]
dump_folder = "./outputs"
description = "Llama 3 8B training"
custom_config_module = "torchtitan_npu.config.custom_config"

[profiling]
enable_profiling = false
save_traces_folder = "profile_trace"
profile_freq = 100

[metrics]
log_freq = 1
enable_tensorboard = true
save_tb_folder = "tb"

[model]
name = "llama3"
flavor = "8b_debug_16die"
hf_assets_path = "./assets/hf/Llama-3.1-8B"
converters = ["npu_rms_norm", "npu_rope", "npu_fusion_attention"]

[optimizer]
name = "AdamW"
lr = 3e-4
eps = 1e-8
swap_optimizer = true
swap_optimizer_times = 16

[lr_scheduler]
warmup_steps = 20  # lr scheduler warm up

[training]
local_batch_size = 2
seq_len = 2048
max_norm = 1.0  # grad norm clipping
steps = 100
dataset = "c4_test"

[parallelism]
data_parallel_replicate_degree = 1
data_parallel_shard_degree = -1
tensor_parallel_degree = 1
pipeline_parallel_degree = 1
context_parallel_degree = 1

[checkpoint]
enable = false
folder = "checkpoint"
interval = 500
last_save_model_only = true
export_dtype = "float32"
async_mode = "disabled" # ["disabled", "async", "async_with_pinned_mem"]

[compile]
enable = true
components = ["model", "loss"]
backend = "npugraphs"

[activation_checkpoint]
mode = "selective"  # ["none", "selective", "full"]
selective_ac_option = "op"  # "int" = ac every positive int layer or 'op', ac based on ops policy

[quantize.linear.float8]
enable_fsdp_float8_all_gather = false
precompute_float8_dynamic_scale_for_fsdp = false
filter_fqns = ["output"]

[validation]
enable = false
dataset = "c4_validation"
freq = 500
steps = 1200 # Recommend value for c4_validation with world-size=8 and seq_len=8192

[comm]
trace_buf_size = 0