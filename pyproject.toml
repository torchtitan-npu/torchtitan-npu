[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "torchtitan_npu"
version = "0.2.1"
dependencies = [
    "torch",
    "torch_npu",
]

[tool.setuptools.packages.find]
include = ["torchtitan_npu*"]
exclude = ["CI*", "test_reports*", "cloudcache*", "third_party*"]